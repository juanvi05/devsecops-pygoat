name: CI DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- ANÁLISIS DE SEGURIDAD ESTÁTICO (SAST) ---
  
  bandit_scan:
    name: Escaneo con Bandit
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        [cite_start]uses: actions/checkout@v4 [cite: 36]
      - name: Configurar Python
        [cite_start]uses: actions/setup-python@v5 [cite: 38]
        with:
          [cite_start]python-version: '3.11' [cite: 40]
      - name: Instalar Bandit
        run: pip install bandit
      - name: Ejecutar Bandit (Filtro High/Medium)
        # Solo reportamos severidad Media o Alta 
        # Guardamos en JSON para el primer reporte 
        run: bandit -r . -f json -o sast-bandit.json -ll || true 
      - name: Subir Reporte Bandit
        uses: actions/upload-artifact@v4
        with:
          name: reporte-bandit
          path: sast-bandit.json

  semgrep_scan:
    name: Escaneo con Semgrep
    runs-on: ubuntu-latest
    container:
      [cite_start]image: returntocorp/semgrep:latest [cite: 33]
    steps:
      - name: Descargar código
        [cite_start]uses: actions/checkout@v4 [cite: 36]
      - name: Ejecutar Semgrep
        # Filtramos por ERROR y WARNING [cite: 27, 28]
        [cite_start]run: semgrep scan --severity=ERROR --severity=WARNING --json --output=sast-semgrep.json || true [cite: 42]
      - name: Subir Reporte Semgrep
        uses: actions/upload-artifact@v4
        with:
          name: reporte-semgrep
          path: sast-semgrep.json

  # --- CONSTRUCCIÓN Y ANÁLISIS DE IMAGEN ---

  build_and_scout:
    name: Build Docker & Scout Scan
    needs: [bandit_scan, semgrep_scan] # Se ejecuta después de los SAST
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      - name: Construir Imagen Docker
        [cite_start]run: docker build -t pygoat-app:latest . [cite: 21]
      - name: Docker Scout Scan
        # Analiza la imagen creada en busca de vulnerabilidades 
        uses: docker/scout-action@v1
        with:
          command: quickview,cves
          image: pygoat-app:latest
